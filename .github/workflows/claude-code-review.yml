name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: [self-hosted, permanent, X64]
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]') &&
      github.event.pull_request.user.login != 'claude[bot]'
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Clean Claude state
        run: rm -rf ~/.claude

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: ${{ vars.CLAUDE_TRACK_PROGRESS || 'true' }}
          use_sticky_comment: ${{ vars.CLAUDE_USE_STICKY_COMMENT || 'true' }}
          allowed_bots: "dependabot[bot]"
          plugin_marketplaces: ${{ vars.CLAUDE_PLUGIN_MARKETPLACES || 'https://github.com/anthropics/claude-code.git' }}
          plugins: ${{ vars.CLAUDE_PLUGINS || 'code-review@claude-code-plugins' }}
          prompt: |
            ${{ vars.CLAUDE_REVIEW_PROMPT || '' }}
            ${{ format(vars.CLAUDE_REVIEW_COMMAND || '/code-review:code-review {0}/pull/{1} --comment', github.repository, github.event.pull_request.number) }}
          claude_args: ${{ vars.CLAUDE_ARGS || format('--model {0}', vars.CLAUDE_MODEL || 'claude-opus-4-6') }}
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
